<div class="login-img">
    <div class="page">
        <div class="">
            <div class="col col-login mx-auto">
                <div class="text-center">
                    <img src="assets/images/brand/logo.png" class="header-brand-img" alt="">
                </div>
            </div>
            <div class="container-login100">
                <div class="wrap-login100 p-0">
                    <div class="card-body">
                        <form class="login100-form validate-form" (ngSubmit)="onSubmit()">
                            <span class="login100-form-title">
                                Yeni Hesap Oluştur
                            </span>

                            <!-- Error Alert -->
                            <div class="alert alert-danger mb-3" *ngIf="errorMessage">
                                <i class="fe fe-alert-triangle me-1"></i> {{ errorMessage }}
                            </div>

                            <div class="wrap-input100 validate-input">
                                <input class="input100" type="text" name="fullName"
                                       [(ngModel)]="dto.fullName" placeholder="Ad Soyad" required>
                                <span class="focus-input100"></span>
                                <span class="symbol-input100">
                                    <i class="zmdi zmdi-account" aria-hidden="true"></i>
                                </span>
                            </div>

                            <div class="wrap-input100 validate-input">
                                <input class="input100" type="email" name="email"
                                       [(ngModel)]="dto.email" placeholder="E-posta Adresi" required>
                                <span class="focus-input100"></span>
                                <span class="symbol-input100">
                                    <i class="zmdi zmdi-email" aria-hidden="true"></i>
                                </span>
                            </div>

                            <div class="wrap-input100 validate-input">
                                <input class="input100" type="password" name="password"
                                       [(ngModel)]="dto.password" placeholder="Şifre" required>
                                <span class="focus-input100"></span>
                                <span class="symbol-input100">
                                    <i class="zmdi zmdi-lock" aria-hidden="true"></i>
                                </span>
                            </div>

                            <div class="wrap-input100 validate-input">
                                <input class="input100" type="password" name="confirmPassword"
                                       [(ngModel)]="dto.confirmPassword" placeholder="Şifre Tekrar" required>
                                <span class="focus-input100"></span>
                                <span class="symbol-input100">
                                    <i class="zmdi zmdi-lock-outline" aria-hidden="true"></i>
                                </span>
                            </div>

                            <div class="container-login100-form-btn mt-3">
                                <button type="submit" class="login100-form-btn btn-primary w-100"
                                        [disabled]="isLoading">
                                    <span *ngIf="isLoading"
                                          class="spinner-border spinner-border-sm me-2"
                                          role="status"></span>
                                    {{ isLoading ? 'Kayıt yapılıyor...' : 'Kayıt Ol' }}
                                </button>
                            </div>

                            <div class="text-center mt-4">
                                <p class="text-muted mb-0">
                                    Zaten hesabınız var mı?
                                    <a routerLink="/login" class="text-primary fw-semibold">Giriş Yap</a>
                                </p>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
